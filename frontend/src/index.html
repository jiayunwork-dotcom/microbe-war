<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微生物战争 - Microbe War</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <div id="lobby-screen" class="screen active">
            <div class="lobby-container">
                <h1 class="game-title">🦠 微生物战争</h1>
                <p class="game-subtitle">Microbe War - 培养皿领地争夺策略游戏</p>

                <div class="lobby-content">
                    <div class="lobby-section">
                        <h2>创建房间</h2>
                        <div class="form-group">
                            <label>玩家名称</label>
                            <input type="text" id="player-name-create" placeholder="输入你的名字" maxlength="12">
                        </div>
                        <div class="form-group">
                            <label>选择菌种</label>
                            <select id="microbe-type-create">
                                <option value="bacteria">🦠 细菌 - 繁殖快，防御弱</option>
                                <option value="fungi">🍄 真菌 - 移动慢，生物膜防御</option>
                                <option value="protozoa">🦠 原生动物 - 吞噬小型菌落</option>
                                <option value="phage">☠️ 噬菌体 - 注入使目标死亡</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>房间名称</label>
                            <input type="text" id="room-name-create" placeholder="房间名称" maxlength="20">
                        </div>
                        <button id="btn-create-room" class="btn btn-primary">创建房间</button>
                    </div>

                    <div class="lobby-section">
                        <h2>房间列表</h2>
                        <div id="room-list" class="room-list">
                            <div class="loading-text">加载房间列表...</div>
                        </div>
                        <button id="btn-refresh-rooms" class="btn btn-secondary">刷新列表</button>
                    </div>

                    <div class="lobby-section">
                        <h2>加入房间</h2>
                        <div class="form-group">
                            <label>玩家名称</label>
                            <input type="text" id="player-name-join" placeholder="输入你的名字" maxlength="12">
                        </div>
                        <div class="form-group">
                            <label>选择菌种</label>
                            <select id="microbe-type-join">
                                <option value="bacteria">🦠 细菌 - 繁殖快，防御弱</option>
                                <option value="fungi">🍄 真菌 - 移动慢，生物膜防御</option>
                                <option value="protozoa">🦠 原生动物 - 吞噬小型菌落</option>
                                <option value="phage">☠️ 噬菌体 - 注入使目标死亡</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>房间ID</label>
                            <input type="text" id="room-id-join" placeholder="输入房间ID">
                        </div>
                        <button id="btn-join-room" class="btn btn-primary">加入房间</button>
                    </div>
                </div>

                <div id="lobby-message" class="lobby-message"></div>
            </div>
        </div>

        <div id="waiting-screen" class="screen">
            <div class="waiting-container">
                <h1>等待玩家加入</h1>
                <div class="room-info">
                    <p>房间ID: <span id="waiting-room-id">-</span></p>
                    <p>当前玩家: <span id="waiting-player-count">0</span> / 6</p>
                </div>
                <div id="waiting-players" class="waiting-players"></div>
                <div class="waiting-actions">
                    <button id="btn-start-game" class="btn btn-primary btn-large" style="display:none;">开始游戏</button>
                    <button id="btn-leave-waiting" class="btn btn-secondary">离开房间</button>
                </div>
                <p class="waiting-hint">等待房主开始游戏，或观战模式加入</p>
                <div class="panel-section waiting-chat-section">
                    <h3>房间聊天</h3>
                    <div id="waiting-chat-messages" class="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="waiting-chat-input" class="chat-input" placeholder="输入消息..." maxlength="200">
                        <button id="waiting-chat-send" class="btn btn-primary btn-small">发送</button>
                    </div>
                    <div class="chat-quick-phrases">
                        <button class="btn btn-small btn-quick-phrase" data-phrase="求联盟">求联盟</button>
                        <button class="btn btn-small btn-quick-phrase" data-phrase="小心后方">小心后方</button>
                        <button class="btn btn-small btn-quick-phrase" data-phrase="我要进攻了">我要进攻了</button>
                        <button class="btn btn-small btn-quick-phrase" data-phrase="帮我挡一下">帮我挡一下</button>
                        <button class="btn btn-small btn-quick-phrase" data-phrase="GG">GG</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-container">
                <div class="game-header">
                    <div class="turn-info">
                        <span class="turn-label">回合</span>
                        <span id="current-turn" class="turn-value">1</span>
                        <span class="turn-separator">/</span>
                        <span class="turn-max">40</span>
                    </div>
                    <div class="game-status" id="game-status">准备中...</div>
                    <div class="header-actions">
                        <button id="btn-spectate-toggle" class="btn btn-small">切换观战</button>
                        <button id="btn-leave-game" class="btn btn-small btn-danger">离开游戏</button>
                    </div>
                </div>

                <div class="game-main">
                    <div class="dish-container">
                        <canvas id="dish-canvas" width="600" height="600"></canvas>
                        <div id="dish-overlay" class="dish-overlay"></div>
                    </div>

                    <div class="side-panel">
                        <div class="panel-section">
                            <h3>玩家领地</h3>
                            <div id="player-stats" class="player-stats"></div>
                        </div>

                        <div class="panel-section">
                            <h3>我的操作</h3>
                            <div class="action-panel">
                                <div class="action-buttons">
                                    <button id="btn-action-spread" class="btn-action active" data-action="spread">
                                        <span class="action-icon">🌱</span>
                                        <span class="action-label">扩散</span>
                                    </button>
                                    <button id="btn-action-attack" class="btn-action" data-action="attack">
                                        <span class="action-icon">⚔️</span>
                                        <span class="action-label">攻击</span>
                                    </button>
                                    <button id="btn-action-evolve" class="btn-action" data-action="evolve">
                                        <span class="action-icon">🧬</span>
                                        <span class="action-label">进化</span>
                                    </button>
                                </div>
                                <div class="marker-buttons">
                                    <button id="btn-marker-danger" class="btn-marker" data-marker="danger" title="危险区标记">
                                        <span class="marker-icon danger">❗</span>
                                        <span class="action-label">危险</span>
                                    </button>
                                    <button id="btn-marker-target" class="btn-marker" data-marker="target" title="目标区标记">
                                        <span class="marker-icon target">🎯</span>
                                        <span class="action-label">目标</span>
                                    </button>
                                    <button id="btn-marker-defense" class="btn-marker" data-marker="defense" title="防御区标记">
                                        <span class="marker-icon defense">🛡️</span>
                                        <span class="action-label">防御</span>
                                    </button>
                                </div>
                                <div class="selected-info" id="selected-info">点击培养皿选择菌落</div>
                            </div>
                        </div>

                        <div class="panel-section">
                            <h3>提交回合</h3>
                            <button id="btn-submit-turn" class="btn btn-primary btn-large btn-full">结束回合</button>
                            <div class="submit-progress">
                                <div id="submit-status">等待提交...</div>
                                <div id="ready-count">已就绪: 0/0</div>
                            </div>
                        </div>

                        <div class="panel-section">
                            <h3>事件日志</h3>
                            <div id="event-log" class="event-log"></div>
                        </div>

                        <div class="panel-section chat-panel-section">
                            <h3>房间聊天</h3>
                            <div id="game-chat-messages" class="chat-messages"></div>
                            <div class="chat-input-row">
                                <input type="text" id="game-chat-input" class="chat-input" placeholder="输入消息..." maxlength="200">
                                <button id="game-chat-send" class="btn btn-primary btn-small">发送</button>
                            </div>
                            <div class="chat-quick-phrases">
                                <button class="btn btn-small btn-quick-phrase" data-phrase="求联盟">求联盟</button>
                                <button class="btn btn-small btn-quick-phrase" data-phrase="小心后方">小心后方</button>
                                <button class="btn btn-small btn-quick-phrase" data-phrase="我要进攻了">我要进攻了</button>
                                <button class="btn btn-small btn-quick-phrase" data-phrase="帮我挡一下">帮我挡一下</button>
                                <button class="btn btn-small btn-quick-phrase" data-phrase="GG">GG</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="result-container">
                <h1 id="result-title">游戏结束</h1>
                <div id="result-ranking" class="result-ranking"></div>

                <div id="result-stats" class="result-stats">
                    <h2>📊 对局统计</h2>
                    <div id="global-stats" class="global-stats"></div>
                    <div id="player-stats-detail" class="player-stats-detail"></div>
                    <div class="chart-container">
                        <h3>📈 领地变化趋势</h3>
                        <canvas id="area-chart-canvas" width="800" height="300"></canvas>
                    </div>
                </div>

                <div class="result-actions">
                    <button id="btn-watch-replay" class="btn btn-secondary btn-large">观看回放</button>
                    <button id="btn-back-lobby" class="btn btn-primary btn-large">返回大厅</button>
                </div>
            </div>
        </div>

        <div id="replay-screen" class="screen">
            <div class="replay-container">
                <div class="replay-header">
                    <h1 id="replay-title">对战回放</h1>
                    <div class="replay-info">
                        <span id="replay-room-name"></span>
                        <span id="replay-turn-info">回合: 0 / 0</span>
                    </div>
                    <button id="btn-exit-replay" class="btn btn-danger btn-small">退出回放</button>
                </div>

                <div class="replay-main">
                    <div class="dish-container">
                        <canvas id="replay-canvas" width="600" height="600"></canvas>
                    </div>

                    <div class="side-panel">
                        <div class="panel-section">
                            <h3>当前回合事件</h3>
                            <div id="replay-event-panel" class="replay-event-panel">
                                <div class="replay-event-empty">拖动进度条或点击播放开始回放</div>
                            </div>
                        </div>

                        <div class="panel-section">
                            <h3>玩家状态</h3>
                            <div id="replay-player-stats" class="replay-player-stats"></div>
                        </div>

                        <div class="panel-section">
                            <h3>聊天记录</h3>
                            <div id="replay-chat" class="replay-chat"></div>
                        </div>
                    </div>
                </div>

                <div class="replay-controls">
                    <button id="btn-replay-play" class="btn btn-primary">
                        <span id="replay-play-icon">▶</span>
                        <span id="replay-play-text">播放</span>
                    </button>
                    <div class="replay-speed-controls">
                        <button class="btn btn-small btn-speed active" data-speed="1">1x</button>
                        <button class="btn btn-small btn-speed" data-speed="2">2x</button>
                        <button class="btn btn-small btn-speed" data-speed="4">4x</button>
                    </div>
                    <div class="replay-progress-container">
                        <input type="range" id="replay-progress" min="0" max="0" value="0" class="replay-progress">
                        <span id="replay-progress-label">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="alliance-request-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content">
                <h3>联盟请求</h3>
                <p id="alliance-request-text"></p>
                <div class="modal-actions">
                    <button id="btn-alliance-accept" class="btn btn-primary">接受</button>
                    <button id="btn-alliance-reject" class="btn btn-secondary">忽略</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="game/main.js"></script>
</body>
</html>
