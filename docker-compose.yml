version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: microbe-war-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    expose:
      - "3001"
    networks:
      - microbe-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: microbe-war-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - microbe-net

  nginx:
    image: nginx:alpine
    container_name: microbe-war-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - microbe-net

networks:
  microbe-net:
    driver: bridge
